[pytest]
# Pytest configuration for AI Invoice Auditor tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test organization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests that require running server
    unit: unit tests
    smoke: quick smoke tests

# Test output options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Minimum Python version
minversion = 3.8

# Timeout for tests (in seconds)
timeout = 300

# Test paths
testpaths = tests

# Coverage options (when running with pytest-cov)
[coverage:run]
source = .
omit = 
    */tests/*
    */.venv/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
